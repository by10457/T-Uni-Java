server:
  port: 7840

spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
    include:
      - auth
  threads:
    virtual:
      enabled: true  # 启用虚拟线程（JDK 21+）
  # main:
  #   lazy-initialization: true
  application:
    name: t-uni-service
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB
      resolve-lazily: true
  datasource:
    type: com.zaxxer.hikari.HikariDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${t.uni.master.host}:${t.uni.master.port}/${t.uni.master.database}?serverTimezone=GMT%2B8&useSSL=false&characterEncoding=utf-8&allowPublicKeyRetrieval=true
    username: ${t.uni.master.username}
    password: ${t.uni.master.password}
  #    dynamic:
  #      primary: master #设置默认的数据源或者数据源组,默认值即为master
  #      strict: false #严格匹配数据源,默认false. true未匹配到指定数据源时抛异常,false使用默认数据源
  #      grace-destroy: false #是否优雅关闭数据源，默认为false，设置为true时，关闭数据源时如果数据源中还存在活跃连接，至多等待10s后强制关闭
  #      datasource:
  #        master:
  #          type: com.zaxxer.hikari.HikariDataSource
  #          driver-class-name: com.mysql.cj.jdbc.Driver
  #          url: jdbc:mysql://${t.uni.master.host}:${t.uni.master.port}/${t.uni.master.database}?serverTimezone=GMT%2B8&useSSL=false&characterEncoding=utf-8&allowPublicKeyRetrieval=true
  #          username: ${t.uni.master.username}
  #          password: ${t.uni.master.password}
  #      aop:
  #        enabled: true

  data:
    redis:
      host: ${t.uni.redis.host}
      port: ${t.uni.redis.port}
      database: ${t.uni.redis.database}
      password: ${t.uni.redis.password}
      lettuce:
        pool:
          max-active: 20 # 最大连接数
          max-wait: -1    # 最大阻塞等待时间(负数表示没限制)
          max-idle: 5    # 最大空闲
          min-idle: 0     # 最小空闲

  quartz:
    job-store-type: jdbc
    jdbc:
      initialize-schema: never
    auto-startup: true
    wait-for-jobs-to-complete-on-shutdown: true
    overwrite-existing-jobs: false
    scheduler-name: quartzScheduler
    properties:
      org:
        quartz:
          scheduler:
            # 默认
            instanceName: quartzScheduler
            # 如果使用集群，instanceId必须唯一，设置成AUTO
            instanceId: AUTO
          jobStore:
            # 存储方式使用JobStoreTX 也就是数据库 LocalDataSourceJobStore
            class: org.springframework.scheduling.quartz.LocalDataSourceJobStore
            driverDelegateClass: org.quartz.impl.jdbcjobstore.StdJDBCDelegate
            # 表名前缀
            tablePrefix: QRTZ_
            useProperties: false
            misfireThreshold: 5000
          threadPool:
            class: org.quartz.simpl.SimpleThreadPool
            threadCount: 20
            threadPriority: 5
            threadsInheritContextClassLoaderOfInitializingThread: true

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8

  mvc:
    throw-exception-if-no-handler-found: true

# 可以配置很多但只能使用一个！！！其他平台参考官方文档
dromara:
  x-file-storage: # 文件存储配置
    default-platform: ${T_UNI_ADMIN_FILE_STORAGE_PLATFORM:local-plus-1} # 默认使用的存储平台
    thumbnail-suffix: ".min.jpg" # 缩略图后缀，例如【.min.jpg】【.png】
    local-plus:
      - platform: local-plus-1 # 存储平台标识
        enable-storage: true  # 启用存储
        enable-access: true # 启用访问（线上请使用 Nginx 配置，效率更高）
        domain: ${dromara.local-plus.domain}
        base-path: ${dromara.local-plus.base-path}
        path-patterns: ${dromara.local-plus.path-patterns}
        storage-path: ${dromara.local-plus.storage-path}
    minio:
      - platform: minio-1 # 存储平台标识
        enable-storage: ${dromara.minio.enabled:false}  # 启用存储
        end-point: ${dromara.minio.endpointUrl}
        domain: ${dromara.minio.domain}
        bucket-name: ${dromara.minio.bucket-name}
        access-key: ${dromara.minio.accessKey}
        secret-key: ${dromara.minio.secretKey}
        base-path: ${dromara.minio.base-path}

t.uni:
  file-storage:
    allowed-platforms: ${T_UNI_ADMIN_FILE_STORAGE_ALLOWED_PLATFORMS:local-plus-1,minio-1}
    allowed-extensions: ${T_UNI_ADMIN_FILE_STORAGE_ALLOWED_EXTENSIONS:jpg,jpeg,png,gif,webp,svg,pdf,txt,md,doc,docx,xls,xlsx,ppt,pptx,zip,rar,7z,mp4,mp3}

mybatis-plus:
  mapper-locations: classpath*:/mapper/*.xml
  global-config:
    db-config:
      logic-delete-field: isDeleted
      logic-delete-value: 1 # 逻辑已删除值
      logic-not-delete-value: 0 # 逻辑未删除值
  configuration:
    map-underscore-to-camel-case: true

management:
  endpoints:
    web:
      exposure:
        include: "*"
      base-path: /api/actuator
  info:
    env:
      enabled: true
    java:
      enabled: true
    os:
      enabled: true
  endpoint:
    health:
      show-details: always
