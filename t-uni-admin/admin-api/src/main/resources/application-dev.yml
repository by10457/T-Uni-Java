server:
  port: 7840

# Knife4j 配置（enable: false 解决与 Spring Boot 3.5.x 兼容性问题）
knife4j:
  enable: false
  setting:
    language: zh_cn

logging:
  level:
    t.uni.service.mapper: info
    t.uni.service.controller: info
    t.uni.service.service: info
    root: info
  pattern:
    dateformat: HH:mm:ss:SSS
#  file:
#    path: "logs/${spring.application.name}"
#    name: "logs/${spring.application.name}"

# mybatis-plus:
#  configuration:
#    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl # 查看日志

t.uni:
  master:
    host: ${T_UNI_ADMIN_DB_HOST:localhost}
    port: ${T_UNI_ADMIN_DB_PORT:3306}
    database: ${T_UNI_ADMIN_DB_NAME:tuni_admin}
    username: ${T_UNI_ADMIN_DB_USERNAME:root}
    password: ${T_UNI_ADMIN_DB_PASSWORD:change_me}

  redis:
    host: ${T_UNI_ADMIN_REDIS_HOST:localhost}
    port: ${T_UNI_ADMIN_REDIS_PORT:6379}
    database: ${T_UNI_ADMIN_REDIS_DATABASE:0}
    password: ${T_UNI_ADMIN_REDIS_PASSWORD:}
    namespace: ${T_UNI_ADMIN_REDIS_NAMESPACE:${T_UNI_REDIS_NAMESPACE:${spring.application.name}:${t.uni.master.database}}}

  jwt:
    secret: ${T_UNI_ADMIN_JWT_SECRET:replace_with_a_64_byte_secret_in_real_env}

dromara:
  local-plus:
    # 访问域名，例如：“http://127.0.0.1:8030/{path-patterns}”，注意后面要和 path-patterns 名字一样
    domain: /api/local-file
    # 访问路径，使用本地在SpringSecurity中要配置权限，如果是和我一样就不用修改了，如果不是api开头，上线需要配置nginx
    path-patterns: /api/local-file/**
    storage-path: ${T_UNI_ADMIN_LOCAL_STORAGE_PATH:/tmp/t-uni-admin/}
    base-path: "" # 基础路径
  minio:
    endpointUrl: ${T_UNI_ADMIN_MINIO_ENDPOINT:http://localhost:9000}
    accessKey: ${T_UNI_ADMIN_MINIO_ACCESS_KEY:}
    secretKey: ${T_UNI_ADMIN_MINIO_SECRET_KEY:}
    bucket-name: ${T_UNI_ADMIN_MINIO_BUCKET:tuni-admin}
    base-path: "" # 基础路径
