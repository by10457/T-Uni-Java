services:
  mysql:
    image: mysql:8.4
    container_name: tuni-mysql
    restart: unless-stopped
    ports:
      - "${T_UNI_DOCKER_MYSQL_PORT:-3306}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${T_UNI_DOCKER_MYSQL_ROOT_PASSWORD:-123456}
      MYSQL_DATABASE: ${T_UNI_DB_NAME:-tuni}
      TZ: Asia/Shanghai
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_0900_ai_ci
    volumes:
      - tuni-mysql-data:/var/lib/mysql
      - ./init_sql/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: tuni-redis
    restart: unless-stopped
    ports:
      - "${T_UNI_DOCKER_REDIS_PORT:-6379}:6379"
    command: redis-server --appendonly yes
    volumes:
      - tuni-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: tuni-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    ports:
      - "${T_UNI_DOCKER_MINIO_PORT:-9000}:9000"
      - "${T_UNI_DOCKER_MINIO_CONSOLE_PORT:-9001}:9001"
    environment:
      MINIO_ROOT_USER: ${T_UNI_ADMIN_MINIO_ACCESS_KEY:-tuniadmin}
      MINIO_ROOT_PASSWORD: ${T_UNI_ADMIN_MINIO_SECRET_KEY:-tuniadmin123456}
      TZ: Asia/Shanghai
    volumes:
      - tuni-minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  server:
    profiles:
      - server
    build:
      context: .
      dockerfile: t-uni-server/Dockerfile
    image: t-uni-server
    container_name: t-uni-server
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - path: .env
        required: false
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SERVER_PORT: 10457
      T_UNI_DB_HOST: mysql
      T_UNI_REDIS_HOST: redis
    ports:
      - "${SERVER_PORT:-10457}:10457"
    volumes:
      - ./logs/t-uni-server:/app/logs

  admin:
    profiles:
      - admin
    build:
      context: .
      dockerfile: t-uni-admin/Dockerfile
    image: t-uni-admin
    container_name: t-uni-admin
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    env_file:
      - path: .env
        required: false
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SERVER_PORT: 7840
      T_UNI_ADMIN_DB_HOST: mysql
      T_UNI_ADMIN_REDIS_HOST: redis
      T_UNI_ADMIN_LOCAL_STORAGE_PATH: /app/data/t-uni-admin/
      T_UNI_ADMIN_MINIO_ENABLED: ${T_UNI_ADMIN_MINIO_ENABLED:-true}
      T_UNI_ADMIN_MINIO_ENDPOINT: http://minio:9000
      T_UNI_ADMIN_MINIO_DOMAIN: ${T_UNI_ADMIN_MINIO_DOMAIN:-http://localhost:9000/tuni-admin}
      T_UNI_ADMIN_MINIO_ACCESS_KEY: ${T_UNI_ADMIN_MINIO_ACCESS_KEY:-tuniadmin}
      T_UNI_ADMIN_MINIO_SECRET_KEY: ${T_UNI_ADMIN_MINIO_SECRET_KEY:-tuniadmin123456}
      T_UNI_ADMIN_MINIO_BUCKET: ${T_UNI_ADMIN_MINIO_BUCKET:-tuni-admin}
      T_UNI_ADMIN_MINIO_AUTO_CREATE_BUCKET: ${T_UNI_ADMIN_MINIO_AUTO_CREATE_BUCKET:-true}
      T_UNI_ADMIN_MINIO_PUBLIC_READ: ${T_UNI_ADMIN_MINIO_PUBLIC_READ:-true}
    ports:
      - "${T_UNI_ADMIN_SERVER_PORT:-7840}:7840"
    volumes:
      - ./logs/t-uni-admin:/app/logs
      - ./data/t-uni-admin:/app/data/t-uni-admin

volumes:
  tuni-mysql-data:
  tuni-redis-data:
  tuni-minio-data:
